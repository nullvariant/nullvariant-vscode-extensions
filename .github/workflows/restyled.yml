name: Restyled

on:
  pull_request:
    branches:
      - main

permissions: {}

jobs:
  restyled:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # SECURITY: Use SHA (immutable) instead of branch ref (user-controlled)
          # to prevent potential injection attacks via malicious branch names.
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Setup branch for commits
        env:
          # SECURITY: Pass user-controlled data via environment variable
          # to prevent shell injection
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
        run: |
          # Validate branch name format (alphanumeric, _, -, /, .)
          if [[ ! "$HEAD_REF" =~ ^[a-zA-Z0-9_/.@-]+$ ]]; then
            echo "::error::Invalid branch name format"
            exit 1
          fi
          git checkout -B "$HEAD_REF"

      - name: Setup Restyled
        uses: restyled-io/actions/setup@bce8886781a3a4e9510a248d37a87e64ba143465 # v4.4.27

      - name: Run Restyled
        uses: restyled-io/actions/run@bce8886781a3a4e9510a248d37a87e64ba143465 # v4.4.27
        with:
          fail-on-differences: false
          suggestions: true
