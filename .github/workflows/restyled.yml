name: Restyled

on:
  pull_request:
    branches:
      - main

permissions: {}

jobs:
  restyled:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          # SECURITY: Use SHA (immutable) instead of branch ref (user-controlled)
          # to prevent potential injection attacks via malicious branch names.
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Setup branch for commits
        env:
          # SECURITY: Pass user-controlled data via environment variable
          # to prevent shell injection
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
        run: |
          # Validate branch name format (alphanumeric, _, -, /, .)
          if [[ ! "$HEAD_REF" =~ ^[a-zA-Z0-9_/.@-]+$ ]]; then
            echo "::error::Invalid branch name format"
            exit 1
          fi
          git checkout -B "$HEAD_REF"

      - name: Setup Restyled
        uses: restyled-io/actions/setup@f31a2185676c560a98c4f9e0185e9bfe8ec3eaf9 # v4.4.24

      - name: Run Restyled
        uses: restyled-io/actions/run@f31a2185676c560a98c4f9e0185e9bfe8ec3eaf9 # v4.4.24
        with:
          fail-on-differences: false
          suggestions: true
