# nullvariant-luna[bot] - The curious explorer
# "Botに418返そうよ！"

name: 👧 Luna Bot

permissions: {}

on:
  workflow_dispatch:
    inputs:
      message:
        description: 'What did Luna discover? (optional)'
        required: false
        default: 'I found something interesting!'

jobs:
  luna-commit:
    name: 👧 Explore and discover
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@58077d3c7e43986b6b15fba718e8ea69e387dfcc # v2.15.1
        with:
          egress-policy: audit

      - name: 👧 Start exploring
        run: |
          echo "✨ Luna here! What's this? ✨"
          echo "Ooh, let me poke around..."
          echo "Hey, did you know bots can get 418 I'm a teapot? Hehe!"

      - name: 🔑 Get App Token
        id: app-token
        uses: tibdex/github-app-token@3beb63f4bd073e61482598c45c71c1019b59b73a # v2
        with:
          app_id: ${{ secrets.LUNA_BOT_APP_ID }}
          private_key: ${{ secrets.LUNA_BOT_PRIVATE_KEY }}

      - name: 📥 Checkout (excitedly)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          token: ${{ steps.app-token.outputs.token }}

      # SECURITY: Use environment variable to prevent script injection
      # See: https://docs.github.com/en/actions/security-guides/security-hardening-for-github-actions#understanding-the-risk-of-script-injection
      - name: 📝 Leave a discovery note
        env:
          USER_MESSAGE: ${{ github.event.inputs.message }}
        run: |
          mkdir -p docs
          cat > docs/LUNA.md << 'EOF'
          # 👧 Luna's Discovery Journal

          > "Every bug is just an undocumented feature waiting to be found!"

          ## Today's Discovery

          EOF
          printf '%s\n' "${USER_MESSAGE}" >> docs/LUNA.md
          cat >> docs/LUNA.md << 'EOF'

          ### Fun Fact
          Did you know? HTTP 418 "I'm a teapot" is a real status code!
          Let's return it to bots! 🫖

          ---

          EOF
          echo "*Last explored: $(date -u +"%Y-%m-%d %H:%M:%S UTC")*" >> docs/LUNA.md
          cat >> docs/LUNA.md << 'EOF'

          > Botに418返そうよ！
          EOF

      - name: 📬 Create PR with verified commit
        env:
          USER_MESSAGE: ${{ github.event.inputs.message }}
        uses: peter-evans/create-pull-request@c0f553fe549906ede9cf27b5156039d195d2ece0 # v8.1.0
        with:
          token: ${{ steps.app-token.outputs.token }}
          sign-commits: true
          author: nullvariant-luna[bot] <2610752+nullvariant-luna[bot]@users.noreply.github.com>
          committer: nullvariant-luna[bot] <2610752+nullvariant-luna[bot]@users.noreply.github.com>
          commit-message: |
            👧 New discovery logged!

            ${{ env.USER_MESSAGE }}

            ~Luna was here~ ✨
          branch: luna/discovery-${{ github.run_number }}
          delete-branch: true
          title: "👧 Luna's discovery journal update"
          body: |
            ## 👧 ✨ LOOK WHAT I FOUND! ✨

            ${{ env.USER_MESSAGE }}

            ---

            > Botに418返そうよ！

            *This PR was curiously created by nullvariant-luna[bot]*

      - name: ✨ Off to the next adventure
        run: |
          echo "That was fun!"
          echo "I wonder what else I can find..."
          echo "✨ See you next time! ✨"
