# nullvariant-blaze[bot] - The hot-headed deployer
# "よっしゃ！デプロイしまくるぞ！"

name: 🐗 Blaze Bot

permissions: {}

on:
  workflow_dispatch:
    inputs:
      message:
        description: 'What should Blaze shout? (optional)'
        required: false
        default: 'LETS GOOOO!!!'

jobs:
  blaze-commit:
    name: 🐗 Charge forward!
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@58077d3c7e43986b6b15fba718e8ea69e387dfcc # v2.15.1
        with:
          egress-policy: audit

      - name: 🐗 Get fired up!
        run: |
          echo "🔥🔥🔥 BLAZE IS HERE! 🔥🔥🔥"
          echo "No time to waste! Let's DO THIS!"

      - name: 🔑 Get App Token
        id: app-token
        uses: tibdex/github-app-token@3beb63f4bd073e61482598c45c71c1019b59b73a # v2
        with:
          app_id: ${{ secrets.BLAZE_BOT_APP_ID }}
          private_key: ${{ secrets.BLAZE_BOT_PRIVATE_KEY }}

      - name: 📥 Checkout (FAST!)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          token: ${{ steps.app-token.outputs.token }}

      # SECURITY: Use environment variable to prevent script injection
      # See: https://docs.github.com/en/actions/security-guides/security-hardening-for-github-actions#understanding-the-risk-of-script-injection
      - name: 📝 Leave a fired-up message
        env:
          USER_MESSAGE: ${{ github.event.inputs.message }}
        run: |
          mkdir -p docs
          cat > docs/BLAZE.md << 'EOF'
          # 🐗 Blaze's Battle Cry

          > "Don't think, just DO IT!"

          ## Today's War Cry

          EOF
          printf '%s\n' "${USER_MESSAGE}" >> docs/BLAZE.md
          cat >> docs/BLAZE.md << 'EOF'

          ---

          EOF
          echo "*Last charged: $(date -u +"%Y-%m-%d %H:%M:%S UTC")*" >> docs/BLAZE.md
          cat >> docs/BLAZE.md << 'EOF'

          > よっしゃ！デプロイしまくるぞ！
          EOF

      - name: 📬 Create PR with verified commit
        env:
          USER_MESSAGE: ${{ github.event.inputs.message }}
        uses: peter-evans/create-pull-request@c0f553fe549906ede9cf27b5156039d195d2ece0 # v8.1.0
        with:
          token: ${{ steps.app-token.outputs.token }}
          sign-commits: true
          author: nullvariant-blaze[bot] <2610768+nullvariant-blaze[bot]@users.noreply.github.com>
          committer: nullvariant-blaze[bot] <2610768+nullvariant-blaze[bot]@users.noreply.github.com>
          commit-message: |
            🐗 CHARGE!!! Updated battle cry

            ${{ env.USER_MESSAGE }}

            NO RETREAT! FULL SPEED AHEAD!
          branch: blaze/charge-${{ github.run_number }}
          delete-branch: true
          title: "🐗 Blaze's battle cry update"
          body: |
            ## 🐗 LETS GOOOO!!!

            ${{ env.USER_MESSAGE }}

            ---

            > よっしゃ！デプロイしまくるぞ！

            *This PR was ENTHUSIASTICALLY created by nullvariant-blaze[bot]*

      - name: 🔥 Victory roar
        run: |
          echo "MISSION COMPLETE!"
          echo "Who's next?! 🔥🔥🔥"
