# Codecov Configuration for Monorepo
# https://docs.codecov.com/docs/codecov-yaml

coverage:
  status:
    project:
      default:
        target: 90%
        threshold: 0%
    patch:
      default:
        target: 90%
      # Defense-in-depth code uses /* c8 ignore */ to exclude unreachable
      # branches from line coverage, but c8 cannot suppress V8 branch data
      # (BRDA) in LCOV. Codecov counts leaked BRDA as "missing coverage."
      # Relax patch target for paths where this is concentrated.
      security:
        paths:
          - "extensions/git-id-switcher/src/security/**"
        target: 80%

# Fix path mapping for monorepo structure
# With sourceMap enabled, lcov.info contains paths like "src/commandAllowlist.ts"
# These need to be mapped to full repository paths
fixes:
  - "src/::extensions/git-id-switcher/src/"

# Ignore test files from coverage
ignore:
  - "**/*.test.ts"
  - "**/test/**"
